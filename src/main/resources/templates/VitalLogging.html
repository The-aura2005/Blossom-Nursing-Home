<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vital Logging</title>
    <link rel="stylesheet" href="/css/staff-dashboard.css">
    <link rel="stylesheet" href="/css/VitalLogging.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=face_4" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=face_6" />
</head>
<body>
    <div class="grid-container">
        <header class="header">
            <div class="header-left">
                <h1>Vital Logging</h1>
            </div>
            <div class="header-right">
                <button class="log-out-btn">Log Out</button>
            </div>
        </header>
        <aside class="sidebar">
            <div class="sidebar-title">Staff Dashboard</div>
            <div class="sidebar-menu">
                <ul>
                    <li><a th:href="@{/MyTask}">My Tasks</a></li>
                    <li><a th:href="@{/MyAssignedResidents}">My Assigned Residents</a></li>
                    <li><a th:href="@{/VitalLogging}">Vital Loggings</a></li>
                    <li><a th:href="@{/activitiesLogging}">Activities Logging</a></li>
                    <li><a th:href="@{/myReports}">Reports</a></li>
                </ul>
            </div>
        </aside>
        <main class="main-content">
            <div class="Vitals-container">
            <h3>Vital Logging</h3>
            <div class="task-alert" th:if="${vitalsMessage}" th:text="${vitalsMessage}"></div>
            <form th:action="@{/vitals}" method="post">
            <div class="dropdown-resident">
                <label for="Select-Resident">Select Resident:</label>
                <select name="residentId" required>
                <option value="">-- Select Resident --</option>
                <th:block th:each="resident : ${residents}">
                <option th:value="${resident.id}" th:text="${resident.name}">
            </option>
        </th:block>
    </select>
            </div>
            <div class="Record-vitals">
                <label for="Temperature">Temperature:</label>
                <input type="number" id="Temperature" name="temperature" placeholder="Enter temperature" required>
                
                <label for="Weight">Weight:</label>
                <input type="number" id="Weight" name="weight" placeholder="Enter weight (kg)" required>
                
                <label for="BloodPressure">Blood Pressure:</label>
                <input type="text" id="BloodPressure" name="bloodPressure" placeholder="Enter blood pressure (e.g., 120/80)" required>
                
                <label for="Notes">Notes:</label>
                <textarea id="Notes" name="notes" placeholder="Enter any additional notes"></textarea>
                
                <button type="submit">Submit</button>
            </div>
            </form>
            </div>
        </main>
    </div>
</body>
</html>
