<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Assigned Residents</title>
    <link rel="stylesheet" href="/css/staff-dashboard.css">
    <link rel="stylesheet" href="/css/AssignedResidents.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=face_4" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=face_6" />
</head>
<body>
    <div class="grid-container">
        <header class="header">
            <div class="header-left">
                <h1 th:text="${'Welcome Back, ' + loggedInUser + '!'}">Welcome Back!</h1>
            </div>
            <div class="header-right">
                <button class="log-out-btn">Log Out</button>
            </div>
        </header>
        <aside class="sidebar">
            <div class="sidebar-title">Staff Dashboard</div>
            <div class="sidebar-menu">
                <ul>
                    <li><a th:href="@{/MyTask}">My Tasks</a></li>
                    <li><a th:href="@{/MyAssignedResidents}" class="active">My Assigned Residents</a></li>
                    <li><a th:href="@{/VitalLogging}">Vital Loggings</a></li>
                    <li><a th:href="@{/activitiesLogging}">Activities Logging</a></li>
                    <li><a th:href="@{/myReports}">Reports</a></li>
                </ul>
            </div>
        </aside>
        <main class="main-content">
            <div class="Assigned-Residents">
                <h3>Assigned Residents</h3>
                <div class="resident-list">
                    <div class="resident-card" th:if="${#lists.isEmpty(assignedResidents)}">
                        <div class="resident-name">No assigned residents yet.</div>
                        <div class="resident-room">Residents appear here when tasks are assigned to you.</div>
                    </div>
                    <div class="resident-card" th:each="resident : ${assignedResidents}">
                        <div class="resident-avatar"><span class="material-symbols-outlined">face_6</span></div>
                        <div class="resident-name" th:text="${resident.residentName}">Resident Name</div>
                        <div class="resident-room" th:text="${'Room ' + resident.roomNumber}">Room 0</div>
                        <div class="resident-status" th:text="${resident.residentStatus}">Assigned</div>
                        <div class="quick-action-btnn">
                            <a class="quick-btnn" th:href="@{/VitalLogging}">Log Vitals</a>
                            <a class="quick-btnn" th:href="@{/activitiesLogging}">Add Activity</a>
                            <a class="quick-btnn" th:href="@{/myReports}">Write Report</a>
                        </div>
                        <div class="resident-room" th:text="${resident.pendingCount + ' pending / ' + resident.completedCount + ' completed tasks'}"></div>
                    </div>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
