<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Activities Logging</title>
    <link rel="stylesheet" href="/css/staff-dashboard.css">
    <link rel="stylesheet" href="/css/activitiesLogging.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=face_4" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=face_6" />
</head>
<body>
    <div class="grid-container">
        <header class="header">
            <div class="header-left">
                <h1 th:text="${'Welcome Back, ' + loggedInUser + '!'}">Welcome Back!</h1>
            </div>
            <div class="header-right">
                <button class="log-out-btn">Log Out</button>
            </div>
        </header>
        <aside class="sidebar">
            <div class="sidebar-title">Staff Dashboard</div>
            <div class="sidebar-menu">
                <ul>
                    <li><a th:href="@{/MyTask}">My Tasks</a></li>
                    <li><a th:href="@{/MyAssignedResidents}">My Assigned Residents</a></li>
                    <li><a th:href="@{/VitalLogging}">Vital Loggings</a></li>
                    <li><a th:href="@{/activitiesLogging}" class="active">Activities Logging</a></li>
                    <li><a th:href="@{/myReports}">Reports</a></li>
                </ul>
            </div>
        </aside>
        <main class="main-content">
        <div class="task-alert" th:if="${taskMessage}" th:text="${taskMessage}"></div>
        <div class="task-alert" th:if="${activityMessage}" th:text="${activityMessage}"></div>
        <div class="task-alert" th:if="${activityError}" th:text="${activityError}"></div>
        <!-- Activity Form Container -->
        <div class="log-activity-container">
            <h3>Log Activity</h3>
            <form class="activity-form" th:action="@{/activitiesLogging}" method="post">
                <label for="Select-Resident">Select Resident:</label>
                <select id="Select-Resident" name="residentId" required>
                    <option value="">Choose a resident</option>
                    <option th:each="resident : ${residents}"
                            th:value="${resident.id}"
                            th:text="${resident.name + ' - Room ' + resident.roomNumber}"></option>
                </select>
                
                <label for="ActivityType">Activity Type:</label>
                <select id="ActivityType" name="activityType" required>
                    <option value="">Select activity type</option>
                    <option value="Medication">Medication</option>
                    <option value="Meal">Meal</option>
                    <option value="Exercise">Exercise</option>
                    <option value="Therapy">Therapy</option>
                    <option value="Medical Appointment">Medical Appointment</option>
                    <option value="Other">Other</option>
                </select>
                
                <label for="ActivityNotes">Notes:</label>
                <textarea id="ActivityNotes" name="notes" placeholder="Enter activity notes"></textarea>
                
                <label for="ActivityDate">Date:</label>
                <input type="date" id="ActivityDate" name="activityDate" required>
                
                <label for="ActivityTime">Time:</label>
                <input type="time" id="ActivityTime" name="activityTime" required>
                
                <button type="submit" id="submit-activity">Submit</button>
            </form>
        </div>

        <!-- Activity History Container -->
        <div class="activity-history-container">
            <h3>Activity History</h3>
            <table class="activity-table">
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Activity</th>
                        <th>Notes</th>
                        <th>Time</th>
                        <th>Resident</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:if="${#lists.isEmpty(activityHistory)}">
                        <td colspan="5">No activity logs yet.</td>
                    </tr>
                    <tr th:each="log : ${activityHistory}">
                        <td th:text="${#temporals.format(log.activityDate, 'MM/dd/yyyy')}">02/18/2026</td>
                        <td th:text="${log.activityType}">Medication</td>
                        <td th:text="${log.notes}">Notes</td>
                        <td th:text="${#temporals.format(log.activityTime, 'hh:mm a')}">09:00 AM</td>
                        <td th:text="${log.resident.name}">Resident</td>
                    </tr>
                </tbody>
            </table>
        </div>
        </main>
    </div>
</body>
</html>
