<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Payment Reports</title>
	<link rel="stylesheet" href="/css/accountant-dashboard.css">
	<link rel="stylesheet" href="/css/unified-dashboard-theme.css">
</head>
<body>
<div class="grid-container">
	<header class="header">
		<div class="header-left">
			<h1>Reports</h1>
		</div>
		<div class="header-right">
			<form th:action="@{/logout}" method="post" style="margin: 0;">
				<button class="log-out-btn" type="submit">Log Out</button>
			</form>
		</div>
	</header>

	<aside class="sidebar">
		<div class="sidebar-title">Accountant Dashboard</div>
		<div class="sidebar-menu">
			<ul>
				<li><a th:href="@{/accountant-dashboard}">Overview</a></li>
				<li><a th:href="@{/resident-payments}">Resident Payments</a></li>
				<li><a th:href="@{/staff-payments}">Staff Payments</a></li>
				<li><a th:href="@{/inventory-payments}">Inventory Purchases</a></li>
				<li><a th:href="@{/report-payments}" class="active">Reports</a></li>
			</ul>
		</div>
	</aside>

	<main class="main-content">
		<section class="table-container">
			<h3>Financial Report</h3>
			<form method="get" th:action="@{/report-payments}" style="margin-bottom: 16px; display: flex; gap: 12px; align-items: end; flex-wrap: wrap;">
				<div>
					<label for="fromDate">From</label>
					<input type="date" id="fromDate" name="fromDate" th:value="${fromDate}">
				</div>
				<div>
					<label for="toDate">To</label>
					<input type="date" id="toDate" name="toDate" th:value="${toDate}">
				</div>
				<button class="btn-primary" type="submit">Apply Filter</button>
				<a class="btn-secondary" th:href="@{/report-payments}" style="padding: 10px 20px; text-decoration:none;">Reset</a>
			</form>
			<table>
				<thead>
				<tr>
					<th>Type</th>
					<th>Description</th>
					<th>Amount</th>
					<th>Date</th>
				</tr>
				</thead>
				<tbody>
				<tr th:if="${#lists.isEmpty(reportRows)}">
					<td colspan="4">No records found for the selected dates.</td>
				</tr>
				<tr th:each="row : ${reportRows}">
					<td th:text="${row.type}">Income</td>
					<td th:text="${row.description}">Resident invoice</td>
					<td th:text="${#numbers.formatDecimal(row.amount, 1, 2)}">0.00</td>
					<td th:text="${row.date}">2026-04-20</td>
				</tr>
				</tbody>
			</table>
		</section>
	</main>
</div>
</body>
</html>
