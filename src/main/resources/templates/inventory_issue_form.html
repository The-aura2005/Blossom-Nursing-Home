<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Issue Inventory Item</title>
    <link rel="stylesheet" href="/css/staff-dashboard.css">
    <link rel="stylesheet" href="/css/unified-dashboard-theme.css">
    <link rel="stylesheet" href="/css/VitalLogging.css">
</head>
<body>
<div class="grid-container">
    <header class="header">
        <div class="header-left">
            <h1 th:text="${loggedInUser != null ? 'Welcome Back, ' + loggedInUser + '!' : 'Welcome Back!'}">Welcome Back!</h1>
        </div>
        <div class="header-right">
            <form th:action="@{/logout}" method="post" style="margin:0;">
                <button class="log-out-btn" type="submit">Log Out</button>
            </form>
        </div>
    </header>
    <aside class="sidebar">
        <div class="sidebar-title">Staff Dashboard</div>
        <div class="sidebar-menu">
            <ul>
                <li><a th:href="@{/staff-dashboard}">Overview</a></li>
                <li><a th:href="@{/MyTask}">My Tasks</a></li>
                <li><a th:href="@{/MyAssignedResidents}">My Assigned Residents</a></li>
                <li><a th:href="@{/VitalLoggingTable}">Vital Loggings</a></li>
                <li><a th:href="@{/activitiesLogging}">Activities Logging</a></li>
                <li><a th:href="@{/myReports}">Reports</a></li>
                <li><a th:href="@{/medications}" class="active">Medication Logs</a></li>
                <li><a th:href="@{/incident-reports}">Incident Reports</a></li>
            </ul>
        </div>
    </aside>

    <main class="main-content">
        <div class="task-alert" th:if="${inventoryError}" th:text="${inventoryError}"></div>
        <div class="Vitals-container" th:if="${selectedResident != null}">
            <h3>Record Item Given To Resident</h3>
            <p th:text="${'Resident: ' + selectedResident.residentName + ' - Room ' + selectedResident.roomNumber}">Resident</p>

            <form th:action="@{/inventory/issue/save}" method="post" class="Record-vitals">
                <input type="hidden" name="residentId" th:value="${selectedResident.residentId}">

                <label for="itemId">Item:</label>
                <select id="itemId" name="itemId" required>
                    <option value="">Select item</option>
                    <option th:each="item : ${availableItems}"
                            th:value="${item.id}"
                            th:text="${item.name + ' (' + item.quantity + ' ' + (item.unit != null ? item.unit : 'units') + ' in stock)'}">
                        Item
                    </option>
                </select>

                <label for="quantity">Quantity Given:</label>
                <input type="number" id="quantity" name="quantity" min="1" required>

                <label for="notes">Notes:</label>
                <textarea id="notes" name="notes" placeholder="Optional notes (for example shift details)"></textarea>

                <button type="submit">Record Issuance</button>
            </form>
        </div>
    </main>
</div>
</body>
</html>
